
    <div class="col-lg-8">

      <div class="form-box">

        <form >
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text"
                     class="form-control"
                     placeholder="Your Name" required>
            </div>
            <div class="col-md-6">
              <input type="email"
                     class="form-control"
                     placeholder="Your Email" pattern=".+@gmail.com" required>
            </div>
            <div class="col-12">
              <input type="text"
                     class="form-control"
                     placeholder="Subject" required>
            </div>
            <div class="col-12">
              <textarea class="form-control"
                        rows="5"
                        placeholder="Your Message" required></textarea>
            </div>

            <div class="col-12">
              <button class="btn btn-primary w-100" onclick="alert('Form submitted successfully!')">
                Send Message
              </button>
            </div>

          </div>

        </form>

      </div>

    </div>
